services:
  url-shortener:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - POSTGRES_URI=postgres://postgres:postgres@postgres:5432/url_shortener?sslmode=disable
      - OTEL_COLLECTOR_URL=otel-collector:4317
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
    networks:
      - url-shortener

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    volumes:
      - .volumes/postgres:/var/lib/postgresql/data
    networks:
      - url-shortener

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.141.0
    command: ["--config", "/etc/otel-collector-config.yaml"]
    volumes:
      - ./.config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    restart: unless-stopped
    networks:
      - url-shortener

  jaeger:
    image: jaegertracing/all-in-one:1.60
    restart: unless-stopped
    networks:
      - url-shortener

  prometheus:
    image: prom/prometheus:v3.8.1
    volumes:
      - ./.config/prometheus.yaml:/etc/prometheus/prometheus.yml
    networks:
      - url-shortener

  grafana:
    image: grafana/grafana:12.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_DISABLE_LOGIN_FORMS: true
    restart: unless-stopped
    volumes:
      - ./.config/grafana/provisioning/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./.config/grafana/provisioning/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./.config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - url-shortener

  redis:
    image: redis:8.6
    networks:
      - url-shortener

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - url-shortener
    networks:
      - url-shortener

networks:
  url-shortener:
    driver: bridge