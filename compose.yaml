services:
  url-shortener:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-shortener-1
    hostname: url-shortener-1
    restart: unless-stopped
    networks:
      - url-shortener
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_PORT=8080
      - POSTGRES_URI=postgres://postgres:postgres@postgres:5432/url_shortener?sslmode=disable
      - OTEL_COLLECTOR_URL=otel-collector:4317
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 3s
      timeout: 5s
      retries: 20
    mem_limit: 256m
    cpus: 0.5
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    volumes:
      - .volumes/postgres:/var/lib/postgresql/data
    mem_limit: 1g
    cpus: 0.70
    restart: unless-stopped
    networks:
      - url-shortener
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6
    mem_limit: 256m
    cpus: 0.30
    restart: unless-stopped
    networks:
      - url-shortener
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.141.0
    command: ["--config", "/etc/otel-collector-config.yaml"]
    volumes:
      - ./.config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    mem_limit: 256m
    cpus: 0.30
    restart: unless-stopped
    networks:
      - url-shortener

  jaeger:
    image: jaegertracing/all-in-one:1.60
    mem_limit: 512m
    cpus: 0.50
    restart: unless-stopped
    networks:
      - url-shortener

  prometheus:
    image: prom/prometheus:v3.8.1
    volumes:
      - ./.config/prometheus.yaml:/etc/prometheus/prometheus.yml
    mem_limit: 1g
    cpus: 0.70
    restart: unless-stopped
    networks:
      - url-shortener

  grafana:
    image: grafana/grafana:12.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_DISABLE_LOGIN_FORMS: true
    volumes:
      - ./.config/grafana/provisioning/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./.config/grafana/provisioning/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./.config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    mem_limit: 300m
    cpus: 0.30
    restart: unless-stopped
    networks:
      - url-shortener

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - url-shortener
    mem_limit: 128m
    cpus: 0.20
    restart: unless-stopped
    networks:
      - url-shortener

networks:
  url-shortener:
    driver: bridge