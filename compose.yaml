version: "3.9"

services:
  api01: &api
    build:
      context: .
      dockerfile: Dockerfile
    hostname: api01
    container_name: api01
    restart: unless-stopped
    networks:
      - url-shortener
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 3s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      - APP_PORT=8080
      - POSTGRES_URI=postgres://postgres:postgres@postgres:5432/url_shortener?sslmode=disable
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - OTEL_COLLECTOR_URL=otel-collector:4317

  api02:
    <<: *api
    hostname: api02
    container_name: api02

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api01:
        condition: service_healthy
      api02:
        condition: service_healthy
    networks:
      - url-shortener
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "128MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    command: postgres -c max_connections=300
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=url_shortener
    volumes:
      - ./.volumes/postgres:/var/lib/postgresql/data
    networks:
      - url-shortener
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.7"
          memory: "1GB"

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: always
    command: >
      redis-server --save "" --appendonly no --maxclients 1024
                   --maxmemory 256mb --maxmemory-policy allkeys-lru
                   --stop-writes-on-bgsave-error no --rdbcompression no
                   --hz 100 --tcp-backlog 511 --timeout 0
                   --loglevel warning
    networks:
      - url-shortener
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: "256MB"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.141.0
    container_name: otel-collector
    command: ["--config", "/etc/otel-collector-config.yaml"]
    volumes:
      - ./.config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    restart: unless-stopped
    networks:
      - url-shortener
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: "256MB"

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: jaeger
    restart: unless-stopped
    networks:
      - url-shortener
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512MB"

  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: prometheus
    volumes:
      - ./.config/prometheus.yaml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - url-shortener
    deploy:
      resources:
        limits:
          cpus: "0.7"
          memory: "1GB"

  grafana:
    image: grafana/grafana:12.1
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_DISABLE_LOGIN_FORMS: true
    volumes:
      - ./.config/grafana/provisioning/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./.config/grafana/provisioning/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./.config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - url-shortener
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: "300MB"

networks:
  url-shortener:
    driver: bridge
    name: url-shortener