version: '3.8'

services:
  url-shortener:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_URI=postgres://postgres:postgres@postgres:5432/url_shortener?sslmode=disable
      - OTEL_COLLECTOR_URL=otel-collector:4317
    networks:
      - url-shortener

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    volumes:
      - .volumes/postgres:/var/lib/postgresql/data
    networks:
      - url-shortener

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.141.0
    command: ["--config", "/etc/otel-collector-config.yaml"]
    volumes:
      - ./.config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    restart: unless-stopped
    networks:
      - url-shortener

  jaeger:
    container_name: jaeger
    image:  jaegertracing/all-in-one:1.60
    ports:
      - "16686:16686"
    restart: unless-stopped
    networks:
      - url-shortener

  prometheus:
    image: prom/prometheus:v3.8.1
    volumes:
      - ./.config/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090
    networks:
      - url-shortener

  grafana:
    image: grafana/grafana:12.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_DISABLE_LOGIN_FORMS: true
    restart: unless-stopped
    volumes:
      - ./.config/grafana/provisioning/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./.config/grafana/provisioning/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./.config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - url-shortener

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - url-shortener

networks:
  url-shortener:
    driver: bridge

volumes:
  pgdata: