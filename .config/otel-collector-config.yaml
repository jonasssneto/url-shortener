receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

  prometheus:
    config:
      scrape_configs:
        - job_name: "url-shortener"
          static_configs:
            - targets: ["url-shortener:2223"]

processors: {}

extensions:
  health_check: {}

exporters:
  prometheus:
    endpoint: 0.0.0.0:9090
    namespace: "url_shortener"

  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true

  debug: {}

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp, debug]

    metrics:
      receivers: [prometheus, otlp]
      exporters: [prometheus, debug]
